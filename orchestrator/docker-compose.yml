version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: appsec_db
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: appsec
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: appsec_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
